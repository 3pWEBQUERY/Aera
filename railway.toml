[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
preDeployCommand = ["npm run db:predeploy"]
startCommand = "npm run start"
healthcheckPath = "/api/health/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
overlapSeconds = "30"
drainingSeconds = "20"
