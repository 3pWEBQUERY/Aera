[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
preDeployCommand = ["npm run db:predeploy"]
startCommand = "npm run start"
# Railway only evaluates this endpoint while activating a deployment. Keep the
# gate independent from Redis, S3 and ClamAV so a temporarily unavailable
# dependency does not make an otherwise running web release undeployable.
# Full dependency readiness remains available at /api/health/ready for the
# external continuous monitor.
healthcheckPath = "/api/health/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
overlapSeconds = 30
drainingSeconds = 20
